# Transparent Pink (Glass) theme core
# Dark accent, subtle neon edges

$pink = rgba(f472b6ff)
$pink_soft = rgba(f9a8d4ff)
$pink_dark = rgba(831843ff)
$glass = rgba(05010dba)
$glass_2 = rgba(090015e6)
$text = rgba(fdf4ffff)
$muted = rgba(bf92b2ff)
$shadow = rgba(00000080)

general {
  gaps_in = 8
  gaps_out = 18
  border_size = 2
  col.active_border = $pink_dark $pink 45deg
  col.inactive_border = rgba(ffffff1a)
  resize_on_border = true
  allow_tearing = false
  layout = dwindle
}

decoration {
  rounding = 14

  blur {
    enabled = true
    size = 10
    passes = 4
    vibrancy = 0.3
    vibrancy_darkness = 0.2
    ignore_opacity = false
  }

  drop_shadow = true
  shadow_range = 28
  shadow_render_power = 4
  col.shadow = $shadow
  col.shadow_inactive = rgba(00000033)

  active_opacity = 0.90
  inactive_opacity = 0.78
  fullscreen_opacity = 1.0
}

animations {
  enabled = true

  bezier = easeOutQuint, 0.23, 1, 0.32, 1
  bezier = easeOutExpo, 0.16, 1, 0.3, 1
  bezier = easeOutBack, 0.34, 1.56, 0.64, 1

  animation = windows, 1, 5, easeOutQuint, popin 80%
  animation = border, 1, 10, easeOutExpo
  animation = fade, 1, 7, easeOutQuint
  animation = workspaces, 1, 5, easeOutBack, slide
  animation = specialWorkspace, 1, 5, easeOutQuint, slidevert
  animation = layers, 1, 7, easeOutQuint, fade
}

dwindle {
  pseudotile = true
  preserve_split = true
  smart_split = true
}

master {
  new_status = master
}

misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
  vfr = true
  mouse_move_enables_dpms = true
  key_press_enables_dpms = true
  animate_manual_resizes = true
}

cursor {
  no_warps = true
}

group {
  col.border_active = $pink
  col.border_inactive = rgba(ffffff1a)
}

